<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skill-Bridge Career Navigator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3350;
      --accent: #4f8ef7;
      --accent2: #7c4dff;
      --green: #4caf82;
      --red: #e05c5c;
      --yellow: #f5a623;
      --text: #e2e8f0;
      --muted: #8892a4;
      --radius: 10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      line-height: 1.6;
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 1.3rem; font-weight: 700; }
    header span { font-size: 1.5rem; }
    .badge {
      margin-left: auto;
      font-size: 0.72rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 10px;
      color: var(--muted);
    }

    .layout {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 0;
      min-height: calc(100vh - 57px);
    }

    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .sidebar h2 { font-size: 0.85rem; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 4px; }

    label { display: block; font-size: 0.9rem; font-weight: 500; margin-bottom: 6px; }

    textarea, select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--radius);
      padding: 10px 12px;
      font-size: 0.9rem;
      font-family: inherit;
      resize: vertical;
      transition: border-color .2s;
      outline: none;
    }
    textarea:focus, select:focus { border-color: var(--accent); }
    textarea { min-height: 220px; }
    select option { background: var(--surface2); }

    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
    }
    .btn:hover { opacity: .88; }
    .btn:active { transform: scale(.98); }
    .btn:disabled { opacity: .4; cursor: not-allowed; }

    .hint { font-size: 0.78rem; color: var(--muted); }

    .main {
      padding: 28px 32px;
      overflow-y: auto;
    }

    .placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 12px;
      color: var(--muted);
      text-align: center;
    }
    .placeholder-icon { font-size: 3rem; }

    .spinner {
      display: none;
      width: 28px; height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 60px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box {
      display: none;
      background: rgba(224,92,92,.1);
      border: 1px solid var(--red);
      border-radius: var(--radius);
      padding: 14px 16px;
      color: var(--red);
      font-size: 0.9rem;
    }

    /* Result sections */
    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .result-header h2 { font-size: 1.25rem; }
    .method-badge {
      font-size: 0.78rem;
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 600;
    }
    .method-ai { background: rgba(79,142,247,.15); color: var(--accent); border: 1px solid rgba(79,142,247,.3); }
    .method-fallback { background: rgba(245,166,35,.1); color: var(--yellow); border: 1px solid rgba(245,166,35,.3); }

    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }
    .card h3 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); margin-bottom: 14px; }

    .skill-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .skill-tag {
      font-size: 0.82rem;
      padding: 4px 10px;
      border-radius: 6px;
      font-weight: 500;
    }
    .tag-found { background: rgba(76,175,130,.15); color: var(--green); border: 1px solid rgba(76,175,130,.3); }
    .tag-high { background: rgba(224,92,92,.15); color: var(--red); border: 1px solid rgba(224,92,92,.3); }
    .tag-medium { background: rgba(245,166,35,.12); color: var(--yellow); border: 1px solid rgba(245,166,35,.3); }
    .tag-low { background: rgba(130,140,164,.1); color: var(--muted); border: 1px solid var(--border); }

    .roadmap-list { list-style: none; display: flex; flex-direction: column; gap: 14px; }
    .roadmap-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
    }
    .roadmap-item .ri-skill { font-size: 0.78rem; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .05em; }
    .roadmap-item .ri-resource { font-weight: 600; font-size: 0.92rem; margin-bottom: 6px; }
    .roadmap-item .ri-meta { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    .roadmap-item a { color: var(--accent); font-size: 0.82rem; text-decoration: none; }
    .roadmap-item a:hover { text-decoration: underline; }
    .time-pill {
      font-size: 0.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2px 8px;
      color: var(--muted);
    }

    .q-list { list-style: none; display: flex; flex-direction: column; gap: 12px; }
    .q-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      font-size: 0.92rem;
      display: flex;
      gap: 12px;
    }
    .q-num { color: var(--accent); font-weight: 700; flex-shrink: 0; }

    .section-title { font-size: 1rem; font-weight: 700; margin-bottom: 14px; margin-top: 4px; }

    .fallback-note {
      background: rgba(245,166,35,.08);
      border: 1px solid rgba(245,166,35,.25);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.82rem;
      color: var(--yellow);
      margin-bottom: 20px;
    }

    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { border-right: none; border-bottom: 1px solid var(--border); }
      .grid2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <span>🚀</span>
    <h1>Skill-Bridge Career Navigator</h1>
    <span class="badge">Powered by GPT-4o-mini + fallback</span>
  </header>

  <div class="layout">
    <!-- Sidebar: Input Form -->
    <aside class="sidebar">
      <div>
        <h2>Your Input</h2>
      </div>

      <div>
        <label for="role-select">Target Role</label>
        <select id="role-select">
          <option value="">Loading roles…</option>
        </select>
      </div>

      <div>
        <label for="resume-input">Resume / Skills</label>
        <textarea id="resume-input" placeholder="Paste your resume text or list your skills and experience here…

Example:
- 3 years Python development
- Built REST APIs with Flask and FastAPI
- Experience with PostgreSQL and Redis
- Used Git daily, familiar with GitHub Actions
- Deployed apps on AWS EC2"></textarea>
        <p class="hint" style="margin-top:6px;">Tip: paste your actual resume text for more accurate analysis.</p>
      </div>

      <button class="btn" id="analyze-btn" onclick="runAnalysis()">Analyze My Skills →</button>

      <div style="border-top: 1px solid var(--border); padding-top: 16px;">
        <p class="hint" style="margin-bottom: 8px; font-weight: 600; color: var(--muted);">Or browse roles</p>
        <div style="display:flex; gap:8px;">
          <input id="skill-filter" type="text" placeholder="Filter by skill (e.g. Python)"
            style="flex:1; background:var(--surface2); border:1px solid var(--border); color:var(--text);
                   border-radius:var(--radius); padding:8px 10px; font-size:0.85rem; outline:none; font-family:inherit;"
            onkeydown="if(event.key==='Enter') filterBySkill()" />
          <button onclick="filterBySkill()"
            style="background:var(--surface2); border:1px solid var(--border); color:var(--text);
                   border-radius:var(--radius); padding:8px 14px; cursor:pointer; font-size:0.85rem;">Go</button>
        </div>
      </div>
    </aside>

    <!-- Main: Results -->
    <main class="main" id="main-content">
      <div class="placeholder" id="placeholder">
        <div class="placeholder-icon">🗺️</div>
        <h3>Your personalized career roadmap will appear here.</h3>
        <p style="max-width:360px;">Select a target role, paste your resume, and click <strong>Analyze My Skills</strong>.</p>
      </div>

      <div class="spinner" id="spinner"></div>
      <div class="error-box" id="error-box"></div>
      <div id="results" style="display:none;"></div>
    </main>
  </div>

  <script>
    // Load roles on startup
    async function loadRoles() {
      try {
        const res = await fetch('/roles');
        const roles = await res.json();
        const sel = document.getElementById('role-select');
        sel.innerHTML = '<option value="">Select a target role…</option>' +
          roles.map(r => `<option value="${r.id}">${r.title} — ${r.avg_salary}</option>`).join('');
      } catch (e) {
        document.getElementById('role-select').innerHTML = '<option value="">Failed to load roles</option>';
      }
    }

    async function runAnalysis() {
      const roleId = document.getElementById('role-select').value;
      const resumeText = document.getElementById('resume-input').value;
      const btn = document.getElementById('analyze-btn');

      // Clear previous state
      showPlaceholder(false);
      showError(null);
      showResults(null);

      if (!roleId) { showError('Please select a target role.'); return; }
      if (!resumeText.trim() || resumeText.trim().length < 20) {
        showError('Please enter at least a short description of your skills and experience.'); return;
      }

      btn.disabled = true;
      document.getElementById('spinner').style.display = 'block';

      try {
        const res = await fetch('/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ resume_text: resumeText, target_role_id: roleId }),
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || 'Analysis failed. Please try again.');
        }

        const data = await res.json();
        renderResults(data);
      } catch (e) {
        showError(e.message);
      } finally {
        btn.disabled = false;
        document.getElementById('spinner').style.display = 'none';
      }
    }

    async function filterBySkill() {
      const skill = document.getElementById('skill-filter').value.trim();
      if (!skill) return;

      showPlaceholder(false);
      showError(null);
      showResults(null);
      document.getElementById('spinner').style.display = 'block';

      try {
        const res = await fetch(`/jobs?skill=${encodeURIComponent(skill)}`);
        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || 'No roles found.');
        }
        const roles = await res.json();
        renderJobList(roles, skill);
      } catch (e) {
        showError(e.message);
      } finally {
        document.getElementById('spinner').style.display = 'none';
      }
    }

    function renderJobList(roles, skill) {
      const html = `
        <div class="result-header">
          <h2>Roles requiring "${skill}"</h2>
          <span style="font-size:.85rem;color:var(--muted)">${roles.length} found</span>
        </div>
        <div style="display:flex;flex-direction:column;gap:14px;">
          ${roles.map(r => `
            <div class="card" style="cursor:pointer" onclick="selectRole('${r.id}')">
              <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap">
                <div>
                  <div style="font-weight:700;font-size:1rem;margin-bottom:4px">${r.title}</div>
                  <div style="font-size:.85rem;color:var(--muted);margin-bottom:8px">${r.description || ''}</div>
                  <div style="font-size:.82rem;color:var(--green)">${r.avg_salary || ''}</div>
                </div>
                <button style="background:var(--accent);border:none;color:#fff;border-radius:6px;padding:6px 14px;cursor:pointer;font-size:.82rem;flex-shrink:0"
                  onclick="event.stopPropagation();selectRole('${r.id}')">Analyze →</button>
              </div>
            </div>
          `).join('')}
        </div>`;
      document.getElementById('results').innerHTML = html;
      document.getElementById('results').style.display = 'block';
    }

    function selectRole(roleId) {
      document.getElementById('role-select').value = roleId;
      document.getElementById('resume-input').focus();
    }

    function renderResults(data) {
      const isAI = data.method === 'ai';
      const foundCount = data.found_skills.length;
      const missingCount = data.missing_skills.length;
      const total = foundCount + missingCount;
      const score = total > 0 ? Math.round((foundCount / total) * 100) : 0;

      const html = `
        <div class="result-header">
          <div>
            <h2>${data.target_role}</h2>
            <div style="font-size:.85rem;color:var(--muted);margin-top:2px">
              ${foundCount} of ${total} required skills matched — <strong style="color:${score >= 70 ? 'var(--green)' : score >= 40 ? 'var(--yellow)' : 'var(--red)'}">${score}% match</strong>
            </div>
          </div>
          <span class="method-badge ${isAI ? 'method-ai' : 'method-fallback'}">
            ${isAI ? '🤖 AI Analysis' : '⚙️ Rule-Based Fallback'}
          </span>
        </div>

        ${data.fallback_reason ? `<div class="fallback-note">⚠️ ${data.fallback_reason}</div>` : ''}

        <!-- Skills Grid -->
        <div class="grid2">
          <div class="card">
            <h3>✅ Skills You Have (${foundCount})</h3>
            ${foundCount === 0
              ? '<p style="color:var(--muted);font-size:.85rem">None of the required skills were detected. Add more detail to your resume.</p>'
              : `<div class="skill-list">${data.found_skills.map(s => `<span class="skill-tag tag-found">${s}</span>`).join('')}</div>`
            }
          </div>
          <div class="card">
            <h3>🎯 Skills to Develop (${missingCount})</h3>
            ${missingCount === 0
              ? '<p style="color:var(--green);font-size:.85rem">You already have all required skills for this role!</p>'
              : `<div class="skill-list">${data.missing_skills.map(s =>
                  `<span class="skill-tag tag-${s.priority}" title="Priority: ${s.priority}">${s.skill}</span>`
                ).join('')}</div>
                <p style="font-size:.75rem;color:var(--muted);margin-top:10px">🔴 High &nbsp;🟡 Medium &nbsp;⚪ Low priority</p>`
            }
          </div>
        </div>

        <!-- Learning Roadmap -->
        ${data.roadmap.length > 0 ? `
        <div style="margin-bottom:24px">
          <div class="section-title">📚 Learning Roadmap</div>
          <ul class="roadmap-list">
            ${data.roadmap.map(r => `
              <li class="roadmap-item">
                <div class="ri-skill">Missing Skill: ${r.skill}</div>
                <div class="ri-resource">${r.resource}</div>
                <div class="ri-meta">
                  <span class="time-pill">⏱ ${r.time_estimate}</span>
                  ${r.url ? `<a href="${r.url}" target="_blank" rel="noopener">Open resource →</a>` : '<span style="font-size:.8rem;color:var(--muted)">No link available</span>'}
                </div>
              </li>
            `).join('')}
          </ul>
        </div>` : ''}

        <!-- Interview Questions -->
        ${data.interview_questions.length > 0 ? `
        <div>
          <div class="section-title">🎤 Mock Interview Questions</div>
          <ul class="q-list">
            ${data.interview_questions.map((q, i) => `
              <li class="q-item">
                <span class="q-num">Q${i + 1}</span>
                <span>${q}</span>
              </li>
            `).join('')}
          </ul>
        </div>` : ''}
      `;

      document.getElementById('results').innerHTML = html;
      document.getElementById('results').style.display = 'block';
    }

    function showPlaceholder(show) {
      document.getElementById('placeholder').style.display = show ? 'flex' : 'none';
    }

    function showError(msg) {
      const el = document.getElementById('error-box');
      if (msg) {
        el.textContent = '⚠️ ' + msg;
        el.style.display = 'block';
      } else {
        el.style.display = 'none';
      }
    }

    function showResults(html) {
      const el = document.getElementById('results');
      if (html) {
        el.innerHTML = html;
        el.style.display = 'block';
      } else {
        el.innerHTML = '';
        el.style.display = 'none';
      }
    }

    loadRoles();
  </script>
</body>
</html>
